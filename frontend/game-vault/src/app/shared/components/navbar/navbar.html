<nav class="navbar">
    <a routerLink="/games" class="navbar-brand">GameVault 🎮</a>

    <div class="navbar-links">
        <a routerLink="/games">Catalog</a>

        @if (isLoggedIn) {
            <a routerLink="/orders">Orders</a>
            <a routerLink="/profile">Profile</a>
            @if (isAdmin) {
                <a routerLink="/admin/games/new">Add Game</a>
                <a routerLink="/admin/dashboard">Admin dashboard</a>
                <a routerLink="/admin/genres">Manage genres</a>
            }
            
            <a routerLink="/cart">Cart ({{ cartCount() }})</a>
            <button (click)="logout()">Logout</button>
        } @else {
            <a routerLink="/auth/login">Login</a>
            <a routerLink="/auth/register">Register</a>
        }
    </div>
</nav>

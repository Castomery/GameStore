@if (userProfile$ | async; as userProfile) {
    <div class="profile">
        <h2>Profile</h2>
        <div class="profile-info">
            <p><strong>Username:</strong> {{ userProfile.name }}</p>
            <p><strong>Email:</strong> {{ userProfile.email }}</p>
        </div>
    </div>
} @else {
    <p>Loading...</p>
}

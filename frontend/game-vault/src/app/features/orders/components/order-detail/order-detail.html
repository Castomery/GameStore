@if(order$ | async; as order) {
    <div class="order-detail-header">
        <h2>Order #{{ order.id }}</h2>
        <p>Created: {{ order.createdAt | date }}</p>
        <p>Total: {{ order.totalPrice | currency }}</p>
    </div>
    <div class="order-items">
        @for (item of order.items; track item.gameId) {
            <div class="order-item">
                <img [src]="item.coverImageUrl" [alt]="item.gameTitle">
                <div class="item-info">
                    <h3>{{ item.gameTitle }}</h3>
                    <p>Price: {{ item.price | currency }}</p>
                </div>
            </div>
        }
    </div>
} @else {
    <p>Loading...</p>
}

<form [formGroup]="gameForm" (ngSubmit)="onSubmit()">
    
    <div>
        <label>Title</label>
        <input type="text" formControlName="title">
    </div>

    <div>
        <label>Genre</label>
        <select formControlName="genreId">
    @if (genres$ | async; as genres) {
        @for (genre of genres; track genre.id) {
            <option [value]="genre.id">{{ genre.name }}</option>
        }
    }
</select>
    </div>

    <div>
        <label>Description</label>
        <textarea formControlName="description"></textarea>
    </div>

    <div>
        <label>Price</label>
        <input type="number" formControlName="price">
    </div>

    <div>
        <label>Release Date</label>
        <input type="date" formControlName="releaseDate">
    </div>

    <div>
        <label>Cover Image URL</label>
        <input type="url" formControlName="coverImageUrl">
    </div>


    <button type="submit" [disabled]="gameForm.invalid">Create Game</button>
</form>
